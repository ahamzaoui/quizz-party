<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Quizz Party - Admin</title>
  <link rel="stylesheet" href="/css/style.css">
  <style>
    .admin-login { max-width: 400px; margin: 4rem auto; text-align: center; background: var(--bg-card); border-radius: var(--radius); padding: 2.5rem; }
    .admin-login h1 { margin-bottom: 1.5rem; color: var(--text); }
    .admin-login input { margin-bottom: 1rem; background: var(--bg); color: var(--text); border: 2px solid var(--text-muted); padding: 0.9rem; border-radius: 12px; font-size: 1rem; width: 100%; }
    .admin-login input:focus { border-color: var(--primary); outline: none; }
    .admin-login .btn { width: 100%; }
    .dashboard { max-width: 1000px; margin: 2rem auto; padding: 0 1rem; }
    .dashboard h1 { text-align: center; margin-bottom: 2rem; }
    .stats-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(200px, 1fr)); gap: 1rem; margin-bottom: 2rem; }
    .stat-card { background: var(--bg-card); border-radius: var(--radius); padding: 1.2rem; text-align: center; }
    .stat-value { font-size: 2rem; font-weight: 800; color: var(--primary); display: block; }
    .stat-label { font-size: 0.85rem; color: var(--text-muted); margin-top: 0.3rem; }
    .section { background: var(--bg-card); border-radius: var(--radius); padding: 1.5rem; margin-bottom: 1.5rem; }
    .section h2 { margin-bottom: 1rem; font-size: 1.2rem; }
    .bar-chart { display: flex; flex-direction: column; gap: 0.5rem; }
    .bar-row { display: flex; align-items: center; gap: 0.8rem; }
    .bar-label { min-width: 140px; font-size: 0.85rem; text-align: right; color: var(--text-muted); overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
    .bar-fill { height: 24px; border-radius: 6px; background: var(--primary); min-width: 2px; transition: width 0.5s; display: flex; align-items: center; padding: 0 8px; font-size: 0.75rem; font-weight: 600; color: white; }
    .mini-chart { display: flex; align-items: flex-end; gap: 3px; height: 80px; }
    .mini-bar { background: var(--primary); border-radius: 3px 3px 0 0; min-width: 8px; flex: 1; opacity: 0.8; position: relative; }
    .mini-bar:hover { opacity: 1; }
    .mini-bar:hover::after { content: attr(data-tip); position: absolute; bottom: 100%; left: 50%; transform: translateX(-50%); background: var(--bg-card); color: var(--text); padding: 2px 6px; border-radius: 4px; font-size: 0.7rem; white-space: nowrap; border: 1px solid var(--text-muted); }
    .chart-label-row { display: flex; justify-content: space-between; font-size: 0.7rem; color: var(--text-muted); margin-top: 0.3rem; }
    .tag-grid { display: flex; flex-wrap: wrap; gap: 0.5rem; }
    .tag { background: rgba(108,92,231,0.15); color: var(--primary); padding: 0.3rem 0.8rem; border-radius: 20px; font-size: 0.85rem; font-weight: 600; }
    .refresh-row { text-align: center; margin-bottom: 1rem; }
    .live-dot { display: inline-block; width: 8px; height: 8px; background: #2ecc71; border-radius: 50%; margin-right: 0.4rem; animation: pulse 1.5s infinite; }
    .error-text { color: var(--danger); }
    #admin-dashboard { display: none; }
    .data-table { width: 100%; border-collapse: collapse; font-size: 0.85rem; }
    .data-table th { text-align: left; padding: 0.6rem 0.8rem; border-bottom: 2px solid var(--primary); color: var(--primary); font-weight: 700; }
    .data-table td { padding: 0.5rem 0.8rem; border-bottom: 1px solid rgba(255,255,255,0.06); }
    .data-table tr:hover td { background: rgba(108,92,231,0.08); }
    .status-badge { padding: 2px 8px; border-radius: 10px; font-size: 0.75rem; font-weight: 600; }
    .status-badge.en-cours { background: rgba(0,206,201,0.2); color: var(--secondary); }
    .status-badge.terminee { background: rgba(0,184,148,0.2); color: var(--success); }
    .table-scroll { overflow-x: auto; }
  </style>
</head>
<body>
  <div id="admin-login" class="admin-login container">
    <h1>🔒 Admin Dashboard</h1>
    <input type="password" id="admin-pass" placeholder="Mot de passe admin" class="input-full">
    <button id="btn-admin-login" class="btn btn-primary btn-large">Connexion</button>
    <p id="login-error" class="error-text"></p>
  </div>

  <div id="admin-dashboard" class="dashboard">
    <h1>📊 Dashboard Admin</h1>
    <div class="refresh-row">
      <span class="live-dot"></span>
      <span id="last-refresh">--</span>
      <button id="btn-refresh" class="btn btn-secondary" style="margin-left:1rem">🔄 Rafraichir</button>
    </div>
    <div id="stats-content"></div>
  </div>

  <script>
    var token = '';
    var $ = function(s) { return document.querySelector(s); };

    $('#btn-admin-login').addEventListener('click', login);
    $('#admin-pass').addEventListener('keydown', function(e) { if (e.key === 'Enter') login(); });

    async function login() {
      var pass = $('#admin-pass').value.trim();
      if (!pass) return;
      $('#login-error').textContent = '';
      try {
        var res = await fetch('/api/admin/login', {
          method: 'POST', headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ password: pass })
        });
        var data = await res.json();
        if (!res.ok) throw new Error(data.error);
        token = data.token;
        $('#admin-login').style.display = 'none';
        $('#admin-dashboard').style.display = 'block';
        loadStats();
      } catch(e) { $('#login-error').textContent = e.message; }
    }

    $('#btn-refresh').addEventListener('click', loadStats);

    async function loadStats() {
      try {
        var res = await fetch('/api/admin/stats', { headers: { 'Authorization': 'Bearer ' + token } });
        var s = await res.json();
        if (!res.ok) throw new Error(s.error);
        $('#last-refresh').textContent = 'Mis a jour : ' + new Date().toLocaleTimeString();
        render(s);
      } catch(e) { $('#stats-content').innerHTML = '<p class="error-text">' + e.message + '</p>'; }
    }

    function render(s) {
      var html = '';
      // KPI cards
      html += '<div class="stats-grid">';
      html += kpi('👁', s.totalVisits, 'Visites totales');
      html += kpi('🎮', s.totalGamesCreated, 'Parties creees');
      html += kpi('✅', s.totalGamesCompleted, 'Parties terminees');
      html += kpi('👥', s.totalPlayersJoined, 'Joueurs rejoints');
      html += kpi('🤖', s.totalAIGenerations, 'Generations IA');
      html += kpi('❓', s.totalQuestionsGenerated, 'Questions generees');
      html += kpi('🔴', s.activeRooms, 'Parties en cours');
      html += kpi('🟢', s.activePlayers, 'Joueurs actifs');
      html += kpi('🏆', s.peakPlayers, 'Record joueurs/partie');
      html += kpi('📊', s.averagePlayersPerGame, 'Moy. joueurs/partie');
      html += kpi('🚫', s.totalKicks, 'Exclusions');
      html += '</div>';

      // Daily visits chart
      html += '<div class="section"><h2>📈 Visites (30 derniers jours)</h2>';
      html += miniChart(s.dailyVisits);
      html += '</div>';

      // Daily games chart
      html += '<div class="section"><h2>🎮 Parties (30 derniers jours)</h2>';
      html += miniChart(s.dailyGames);
      html += '</div>';

      // Top themes
      if (s.topAIThemes && s.topAIThemes.length) {
        html += '<div class="section"><h2>🔥 Themes IA populaires</h2>';
        html += barChart(s.topAIThemes);
        html += '</div>';
      }

      if (s.topThemes && s.topThemes.length) {
        html += '<div class="section"><h2>📋 Themes de quiz</h2>';
        html += barChart(s.topThemes);
        html += '</div>';
      }

      // Models, languages, difficulties
      html += '<div class="section"><h2>⚙ Repartition</h2>';
      html += '<h3 style="margin:0.5rem 0">Modeles IA</h3><div class="tag-grid">';
      for (var m in s.models) html += '<span class="tag">' + m + ' (' + s.models[m] + ')</span>';
      html += '</div>';
      html += '<h3 style="margin:0.8rem 0 0.5rem">Langues</h3><div class="tag-grid">';
      for (var l in s.languages) html += '<span class="tag">' + l + ' (' + s.languages[l] + ')</span>';
      html += '</div>';
      html += '<h3 style="margin:0.8rem 0 0.5rem">Difficultes</h3><div class="tag-grid">';
      for (var d in s.difficulties) html += '<span class="tag">' + d + ' (' + s.difficulties[d] + ')</span>';
      html += '</div></div>';

      // Quiz history table
      html += '<div class="section"><h2>📝 Quizz generes (derniers 50)</h2>';
      if (s.quizHistory && s.quizHistory.length) {
        html += '<div class="table-scroll"><table class="data-table"><thead><tr>';
        html += '<th>PIN</th><th>Titre</th><th>Questions</th><th>Theme</th><th>Date</th>';
        html += '</tr></thead><tbody>';
        for (var i = 0; i < s.quizHistory.length; i++) {
          var q = s.quizHistory[i];
          html += '<tr><td>' + esc(q.pin) + '</td><td>' + esc(q.title) + '</td>';
          html += '<td>' + q.questions + '</td><td>' + esc(q.theme) + '</td>';
          html += '<td>' + fmtDate(q.createdAt) + '</td></tr>';
        }
        html += '</tbody></table></div>';
      } else { html += '<p style="color:var(--text-muted)">Aucun quiz pour le moment</p>'; }
      html += '</div>';

      // Game history table
      html += '<div class="section"><h2>🎮 Historique des parties (dernieres 50)</h2>';
      if (s.gameHistory && s.gameHistory.length) {
        html += '<div class="table-scroll"><table class="data-table"><thead><tr>';
        html += '<th>PIN</th><th>Joueurs</th><th>Debut</th><th>Fin</th><th>Duree</th><th>Statut</th>';
        html += '</tr></thead><tbody>';
        for (var i = 0; i < s.gameHistory.length; i++) {
          var g = s.gameHistory[i];
          var dur = g.startedAt && g.endedAt ? fmtDuration(g.startedAt, g.endedAt) : '-';
          var statusCls = g.status === 'en cours' ? 'en-cours' : 'terminee';
          html += '<tr><td>' + esc(g.pin) + '</td><td>' + g.players + '</td>';
          html += '<td>' + fmtDate(g.startedAt) + '</td>';
          html += '<td>' + (g.endedAt ? fmtDate(g.endedAt) : '-') + '</td>';
          html += '<td>' + dur + '</td>';
          html += '<td><span class="status-badge ' + statusCls + '">' + esc(g.status) + '</span></td></tr>';
        }
        html += '</tbody></table></div>';
      } else { html += '<p style="color:var(--text-muted)">Aucune partie pour le moment</p>'; }
      html += '</div>';

      $('#stats-content').innerHTML = html;
    }

    function kpi(icon, val, label) {
      return '<div class="stat-card"><span class="stat-value">' + icon + ' ' + val + '</span><span class="stat-label">' + label + '</span></div>';
    }

    function barChart(items) {
      var max = items[0] ? items[0].count : 1;
      var html = '<div class="bar-chart">';
      for (var i = 0; i < items.length; i++) {
        var pct = Math.max(5, (items[i].count / max) * 100);
        html += '<div class="bar-row"><span class="bar-label">' + esc(items[i].name) + '</span>';
        html += '<div class="bar-fill" style="width:' + pct + '%">' + items[i].count + '</div></div>';
      }
      html += '</div>';
      return html;
    }

    function miniChart(days) {
      var max = 1;
      for (var i = 0; i < days.length; i++) { if (days[i].count > max) max = days[i].count; }
      var html = '<div class="mini-chart">';
      for (var i = 0; i < days.length; i++) {
        var h = Math.max(2, (days[i].count / max) * 100);
        html += '<div class="mini-bar" style="height:' + h + '%" data-tip="' + days[i].date + ': ' + days[i].count + '"></div>';
      }
      html += '</div>';
      html += '<div class="chart-label-row"><span>' + days[0].date + '</span><span>' + days[days.length-1].date + '</span></div>';
      return html;
    }

    function esc(s) { if (!s) return ''; var d = document.createElement('div'); d.textContent = s; return d.innerHTML; }

    function fmtDate(iso) {
      if (!iso) return '-';
      var d = new Date(iso);
      return d.toLocaleDateString('fr-FR') + ' ' + d.toLocaleTimeString('fr-FR', { hour: '2-digit', minute: '2-digit' });
    }

    function fmtDuration(start, end) {
      var ms = new Date(end) - new Date(start);
      var sec = Math.floor(ms / 1000);
      if (sec < 60) return sec + 's';
      var min = Math.floor(sec / 60);
      sec = sec % 60;
      if (min < 60) return min + 'min ' + sec + 's';
      var h = Math.floor(min / 60);
      min = min % 60;
      return h + 'h ' + min + 'min';
    }

    // Auto-refresh every 30s
    setInterval(function() { if (token) loadStats(); }, 30000);
  </script>
</body>
</html>
