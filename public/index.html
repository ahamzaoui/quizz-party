<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Quizz Party</title>
  <link rel="stylesheet" href="/css/style.css">
</head>
<body>
  <div class="container fade-in">
    <div class="logo-section">
      <h1 class="logo">🎯 Quizz Party</h1>
      <p class="tagline">Jouez entre amis, testez vos connaissances !</p>
    </div>

    <div class="card-grid">
      <a href="/host.html" class="card card-host">
        <span class="card-icon">🎤</span>
        <h2>Créer un Quiz</h2>
        <p>Crée tes questions, choisis un thème et lance la partie !</p>
      </a>
      <a href="/play.html" class="card card-player">
        <span class="card-icon">🎮</span>
        <h2>Rejoindre</h2>
        <p>Entre le code PIN ou scanne le QR code pour jouer !</p>
      </a>
    </div>

    <footer class="home-footer">
      <p>Connectez-vous au même réseau WiFi pour jouer ensemble</p>
    </footer>
  </div>
</body>
</html>
